  <rect x="72" y="1204" width="1096" height="420" rx="36" fill="white"/>
  <text x="72" y="182" fill="#EEF6F4" font-family="Arial" font-size="34" letter-spacing="3"><tspan x="72" dy="0">REGULSKI | TERAPIA BEHAWIORALNA</tspan></text>
  <text x="72" y="318" fill="#EEF6F4" font-family="Arial" font-size="86" font-weight="700"><tspan x="72" dy="0">Pies do pracy z ludźmi?</tspan></text>
  <text x="72" y="346" fill="#EEF6F4" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Jak ocenić predyspozycje, regulację i bezpieczeństwo zanim</tspan><tspan x="72" dy="44">pomyślisz o roli wspierającej</tspan></text>
  <text x="72" y="1298" fill="#182522" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">DLA KOGO</tspan></text>
  <text x="72" y="1360" fill="#182522" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Osoba myśląca o psie wspierającym, terapeutycznym albo pracującym przy</tspan><tspan x="72" dy="42">ludziach.</tspan></text>
  <text x="72" y="1530" fill="#182522" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">OBIETNICA</tspan></text>
  <text x="72" y="1592" fill="#182522" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Specjalistyczny materiał dla psa do pracy z ludźmi.</tspan></text>
  <rect x="72" y="1678" width="220" height="40" rx="20" fill="#88B5AA"/>
  <text x="104" y="1705" fill="#EEF6F4" font-family="Arial" font-size="24" font-weight="700"><tspan x="104" dy="0">SZYBKI PORADNIK</tspan></text>
