  <rect x="72" y="1220" width="1096" height="366" rx="36" fill="white"/>
  <text x="72" y="182" fill="#F8F3EA" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#F8F3EA" font-family="Arial" font-size="86" font-weight="700">Domowy enrichment</text>
  <text x="72" y="425" fill="#F8F3EA" font-family="Georgia" font-size="34">14-dniowy plan aktywności i regulacji pobudzenia dla psa lub kota mieszkającego w domu</text>
  <text x="72" y="1298" fill="#241A10" font-family="Arial" font-size="26" letter-spacing="2">DLA KOGO</text>
  <text x="72" y="1360" fill="#241A10" font-family="Georgia" font-size="34">Opiekunowie psów i kotów, którzy chcą ograniczyć nudę, rozkręcanie się zachowań problemowych i żyć z bardziej przewidywalną rutyną.</text>
  <text x="72" y="1480" fill="#241A10" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#241A10" font-family="Georgia" font-size="34">Daje prosty plan aktywności domowych, odpoczynku i obserwacji sygnałów przeciążenia bez przerabiania domu w tor przeszkód.</text>
  <rect x="72" y="1650" width="220" height="40" rx="20" fill="#D8AE73"/>
  <text x="104" y="1677" fill="#F8F3EA" font-family="Arial" font-size="24" font-weight="700">SZYBKI PORADNIK</text>
</svg>
