  <text x="72" y="182" fill="#F7F1E9" font-family="Arial" font-size="34" letter-spacing="3"><tspan x="72" dy="0">REGULSKI | TERAPIA BEHAWIORALNA</tspan></text>
  <text x="72" y="318" fill="#F7F1E9" font-family="Arial" font-size="74" font-weight="700"><tspan x="72" dy="0">Czy Twój pies naprawdę</tspan><tspan x="72" dy="92">potrzebuje więcej ruchu?</tspan></text>
  <text x="72" y="438" fill="#F7F1E9" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Prawda o pobudzeniu, które nie schodzi po spacerze</tspan></text>
  <text x="72" y="1298" fill="#251B16" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">DLA KOGO</tspan></text>
  <text x="72" y="1360" fill="#251B16" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Opiekun psa, który widzi nakręcanie po aktywności, słaby odpoczynek i</tspan><tspan x="72" dy="42">trudność z zejściem z pobudzenia.</tspan></text>
  <text x="72" y="1530" fill="#251B16" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">OBIETNICA</tspan></text>
  <text x="72" y="1592" fill="#251B16" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Szerokie wejście do psiego lejka PDF. Materiał obala mit „więcej ruchu =</tspan><tspan x="72" dy="42">rozwiązanie” i prowadzi do właściwej ścieżki.</tspan></text>
  <rect x="72" y="1678" width="220" height="40" rx="20" fill="#D88F5A"/>
