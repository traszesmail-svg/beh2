  <text x="72" y="182" fill="#F0F5F6" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#F0F5F6" font-family="Arial" font-size="86" font-weight="700">Kot: stres i środowisko</text>
  <text x="72" y="425" fill="#F0F5F6" font-family="Georgia" font-size="34">Jak rozpoznać napięcie, poprawić dom i nie utrwalać problemów codziennymi błędami</text>
  <text x="72" y="1298" fill="#1A262C" font-family="Arial" font-size="26" letter-spacing="2">DLA KOGO</text>
  <text x="72" y="1360" fill="#1A262C" font-family="Georgia" font-size="34">Opiekunowie kotów lękowych, wycofanych, łatwo przeciążających się lub funkcjonujących w stałym napięciu.</text>
  <text x="72" y="1480" fill="#1A262C" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#1A262C" font-family="Georgia" font-size="34">Pomaga zobaczyć dom oczami kota i uporządkować środowisko, zanim problem rozwinie się w konflikt, unikanie albo zachowania obronne.</text>
