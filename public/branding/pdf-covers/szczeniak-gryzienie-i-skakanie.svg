  <circle cx="230" cy="1540" r="310" fill="#8DAE6E" fill-opacity="0.12"/>
  <rect x="72" y="1204" width="1096" height="420" rx="36" fill="white"/>
  <text x="72" y="182" fill="#F4F4EE" font-family="Arial" font-size="34" letter-spacing="3"><tspan x="72" dy="0">REGULSKI | TERAPIA BEHAWIORALNA</tspan></text>
  <text x="72" y="318" fill="#F4F4EE" font-family="Arial" font-size="86" font-weight="700"><tspan x="72" dy="0">Szczeniak gryzie i skacze?</tspan></text>
  <text x="72" y="346" fill="#F4F4EE" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Jak odróżnić typowe zachowanie rozwojowe od przeciążenia i</tspan><tspan x="72" dy="44">braku planu</tspan></text>
  <text x="72" y="1298" fill="#1D2418" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">DLA KOGO</tspan></text>
  <text x="72" y="1360" fill="#1D2418" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Opiekun szczeniaka lub młodego psa, który widzi podgryzanie, skakanie,</tspan><tspan x="72" dy="42">łapanie rąk i chaos przy pobudzeniu.</tspan></text>
  <text x="72" y="1530" fill="#1D2418" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">OBIETNICA</tspan></text>
  <text x="72" y="1592" fill="#1D2418" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Pierwszy płatny PDF w ścieżce szczeniaka. Ma szybko wyjaśnić problem,</tspan><tspan x="72" dy="42">dać prosty plan 14 dni i skierować dalej do core o wyciszeniu albo do</tspan><tspan x="72" dy="42">konsultacji.</tspan></text>
  <rect x="72" y="1678" width="220" height="40" rx="20" fill="#8DAE6E"/>
  <text x="104" y="1705" fill="#F4F4EE" font-family="Arial" font-size="24" font-weight="700"><tspan x="104" dy="0">PORADNIK GLOWNY</tspan></text>
