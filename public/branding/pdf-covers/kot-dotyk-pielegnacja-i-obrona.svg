  <text x="72" y="182" fill="#EEF6F4" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#EEF6F4" font-family="Arial" font-size="86" font-weight="700">Kot: dotyk i pielęgnacja</text>
  <text x="72" y="425" fill="#EEF6F4" font-family="Georgia" font-size="34">Pierwszy plan przy obronie, napięciu i trudnych procedurach codziennych</text>
  <text x="72" y="1298" fill="#182522" font-family="Arial" font-size="26" letter-spacing="2">DLA KOGO</text>
  <text x="72" y="1360" fill="#182522" font-family="Georgia" font-size="34">Opiekunowie kotów, które źle znoszą chwytanie, podnoszenie, czesanie albo inne proste procedury.</text>
  <text x="72" y="1480" fill="#182522" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#182522" font-family="Georgia" font-size="34">Pomaga odróżnić niechęć do konkretnego dotyku od szerszego stresu albo bólu i ustawić bezpieczniejszy kontakt.</text>
