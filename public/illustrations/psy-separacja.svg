<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Door in background -->
  <rect x="295" y="80" width="100" height="220" rx="4" stroke="#1a2e2a" stroke-width="2" fill="#f0ebe4"/>
  <rect x="300" y="85" width="90" height="210" rx="3" stroke="#1a2e2a" stroke-width="1" fill="white" opacity="0.3"/>
  <!-- door handle -->
  <circle cx="310" cy="195" r="6" stroke="#1a2e2a" stroke-width="2" fill="none"/>
  <!-- door window small -->
  <rect x="320" y="105" width="50" height="36" rx="3" stroke="#1a2e2a" stroke-width="1.5" fill="#e8f4f1" opacity="0.5"/>

  <!-- Dog lying down by door, sad -->
  <!-- body lying, elongated -->
  <path d="M120 285 Q110 260 115 235 Q118 218 145 212 Q175 206 210 212 Q238 218 248 238 Q255 258 248 282 Q238 300 200 305 Q155 308 120 285Z" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- head resting on paws, low -->
  <circle cx="252" cy="252" r="34" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- ears droopy/flat sad -->
  <path d="M232 230 Q218 212 222 198 Q230 207 234 226" stroke="#1a2e2a" stroke-width="2" fill="#f0ebe4"/>
  <path d="M268 228 Q280 210 277 196 Q269 205 266 224" stroke="#1a2e2a" stroke-width="2" fill="#f0ebe4"/>
  <!-- sad eyes looking up toward door -->
  <circle cx="240" cy="248" r="7" stroke="#1a2e2a" stroke-width="1.5" fill="white"/>
  <circle cx="240" cy="251" r="5" fill="#1a2e2a"/>
  <circle cx="241" cy="249" r="2" fill="white"/>
  <circle cx="262" cy="250" r="7" stroke="#1a2e2a" stroke-width="1.5" fill="white"/>
  <circle cx="262" cy="253" r="5" fill="#1a2e2a"/>
  <circle cx="263" cy="251" r="2" fill="white"/>
  <!-- sad brow angle -->
  <path d="M234 242 Q240 238 246 242" stroke="#1a2e2a" stroke-width="1.5" fill="none"/>
  <path d="M256 243 Q262 239 268 243" stroke="#1a2e2a" stroke-width="1.5" fill="none"/>
  <!-- snout -->
  <ellipse cx="260" cy="262" rx="12" ry="8" stroke="#1a2e2a" stroke-width="1.5" fill="#f8f5f0"/>
  <ellipse cx="262" cy="258" rx="5" ry="3.5" fill="#1a2e2a"/>
  <!-- paws stretched toward door -->
  <path d="M278 280 Q295 278 308 282 Q298 292 280 290Z" stroke="#1a2e2a" stroke-width="1.5" fill="#f8f5f0"/>
  <!-- tail curled low -->
  <path d="M118 270 Q90 268 85 252 Q82 238 95 236 Q103 244 98 256 Q95 265 105 268" stroke="#1a2e2a" stroke-width="2.5" fill="none"/>

  <!-- Clock on wall -->
  <circle cx="100" cy="140" r="36" stroke="#1a2e2a" stroke-width="2" fill="white"/>
  <circle cx="100" cy="140" r="30" stroke="#1a2e2a" stroke-width="1" fill="none" opacity="0.2"/>
  <line x1="100" y1="140" x2="100" y2="116" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="100" y1="140" x2="118" y2="152" stroke="#b07b3f" stroke-width="2"/>
  <circle cx="100" cy="140" r="3" fill="#1a2e2a"/>
  <!-- clock ticks -->
  <line x1="100" y1="110" x2="100" y2="115" stroke="#1a2e2a" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="140" x2="125" y2="140" stroke="#1a2e2a" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="170" x2="100" y2="165" stroke="#1a2e2a" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="140" x2="75" y2="140" stroke="#1a2e2a" stroke-width="1.5" opacity="0.5"/>

  <!-- Ground/floor -->
  <line x1="40" y1="308" x2="440" y2="308" stroke="#d4ede6" stroke-width="2"/>
  <!-- Wall/floor join -->
  <line x1="40" y1="200" x2="440" y2="200" stroke="#d4ede6" stroke-width="1.5" opacity="0.4"/>
</svg>
