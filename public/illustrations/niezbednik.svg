<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Phone frame -->
  <rect x="175" y="50" width="130" height="240" rx="16" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <rect x="185" y="65" width="110" height="210" rx="8" stroke="#1a2e2a" stroke-width="1.5" fill="white"/>
  <!-- notch -->
  <rect x="218" y="65" width="44" height="12" rx="6" fill="#f8f5f0"/>

  <!-- Document item 1 - downloaded (checked) -->
  <rect x="193" y="88" width="94" height="40" rx="4" stroke="#2f7667" stroke-width="1.5" fill="#e8f4f1"/>
  <!-- pdf icon -->
  <rect x="200" y="96" width="18" height="22" rx="2" stroke="#2f7667" stroke-width="1.2" fill="white"/>
  <line x1="204" y1="103" x2="214" y2="103" stroke="#2f7667" stroke-width="1" opacity="0.5"/>
  <line x1="204" y1="108" x2="214" y2="108" stroke="#2f7667" stroke-width="1" opacity="0.5"/>
  <!-- checkmark circle -->
  <circle cx="270" cy="108" r="8" stroke="#2f7667" stroke-width="1.5" fill="white"/>
  <path d="M265 108 L269 112 L276 104" stroke="#2f7667" stroke-width="1.8" fill="none"/>
  <!-- title line -->
  <line x1="222" y1="100" x2="258" y2="100" stroke="#1a2e2a" stroke-width="1.5" opacity="0.4"/>
  <line x1="222" y1="110" x2="252" y2="110" stroke="#1a2e2a" stroke-width="1" opacity="0.3"/>

  <!-- Document item 2 - downloading (progress) -->
  <rect x="193" y="136" width="94" height="40" rx="4" stroke="#b07b3f" stroke-width="1.5" fill="#fdf3e3"/>
  <rect x="200" y="144" width="18" height="22" rx="2" stroke="#b07b3f" stroke-width="1.2" fill="white"/>
  <line x1="204" y1="151" x2="214" y2="151" stroke="#b07b3f" stroke-width="1" opacity="0.5"/>
  <line x1="204" y1="156" x2="214" y2="156" stroke="#b07b3f" stroke-width="1" opacity="0.5"/>
  <!-- progress bar -->
  <rect x="222" y="154" width="58" height="5" rx="2.5" stroke="#b07b3f" stroke-width="1" fill="none"/>
  <rect x="222" y="154" width="38" height="5" rx="2.5" fill="#b07b3f"/>
  <line x1="222" y1="148" x2="272" y2="148" stroke="#1a2e2a" stroke-width="1.5" opacity="0.4"/>

  <!-- Document item 3 - locked -->
  <rect x="193" y="184" width="94" height="40" rx="4" stroke="#1a2e2a" stroke-width="1" fill="white" opacity="0.6"/>
  <rect x="200" y="192" width="18" height="22" rx="2" stroke="#1a2e2a" stroke-width="1" fill="white" opacity="0.5"/>
  <line x1="222" y1="196" x2="272" y2="196" stroke="#1a2e2a" stroke-width="1.5" opacity="0.2"/>
  <line x1="222" y1="206" x2="262" y2="206" stroke="#1a2e2a" stroke-width="1" opacity="0.2"/>

  <!-- Download arrow big outside phone -->
  <circle cx="370" cy="185" r="38" stroke="#2f7667" stroke-width="2" fill="white"/>
  <line x1="370" y1="163" x2="370" y2="195" stroke="#2f7667" stroke-width="2.5"/>
  <path d="M356 182 L370 196 L384 182" stroke="#2f7667" stroke-width="2.5" fill="none"/>
  <!-- arrow base line -->
  <line x1="358" y1="200" x2="382" y2="200" stroke="#2f7667" stroke-width="2"/>

  <!-- Stars/sparkles -->
  <path d="M110 100 L113 90 L116 100 L126 103 L116 106 L113 116 L110 106 L100 103Z" stroke="#b07b3f" stroke-width="1.5" fill="none"/>
  <path d="M130 145 L132 138 L134 145 L141 147 L134 149 L132 156 L130 149 L123 147Z" stroke="#b07b3f" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- Paw print on top document -->
  <circle cx="278" cy="96" r="4" stroke="#b07b3f" stroke-width="1.2" fill="none" opacity="0.5"/>
  <circle cx="270" cy="90" r="2.5" stroke="#b07b3f" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="278" cy="88" r="2.5" stroke="#b07b3f" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="286" cy="90" r="2.5" stroke="#b07b3f" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
