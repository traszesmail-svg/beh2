<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person leaning back, holding taut leash -->
  <circle cx="148" cy="100" r="22" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <line x1="148" y1="122" x2="148" y2="195" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- arm forward holding leash - strained -->
  <line x1="148" y1="138" x2="192" y2="160" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- other arm back for balance -->
  <line x1="148" y1="138" x2="110" y2="158" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- legs braced -->
  <line x1="148" y1="195" x2="130" y2="248" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="148" y1="195" x2="162" y2="248" stroke="#1a2e2a" stroke-width="2.5"/>

  <!-- Taut leash -->
  <line x1="192" y1="158" x2="310" y2="210" stroke="#2f7667" stroke-width="2.5"/>

  <!-- Dog lunging forward - alert/reactive -->
  <!-- body leaning forward -->
  <ellipse cx="345" cy="228" rx="45" ry="22" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0" transform="rotate(-20 345 228)"/>
  <!-- head -->
  <circle cx="372" cy="200" r="28" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- ears pricked up alert -->
  <path d="M358 180 Q352 158 360 150 Q366 160 366 178" stroke="#1a2e2a" stroke-width="2" fill="#f0ebe4"/>
  <path d="M378 178 Q380 156 374 148 Q370 158 368 176" stroke="#1a2e2a" stroke-width="2" fill="#f0ebe4"/>
  <!-- alert eyes wide open -->
  <circle cx="362" cy="196" r="6" stroke="#1a2e2a" stroke-width="1.5" fill="white"/>
  <circle cx="363" cy="197" r="4" fill="#1a2e2a"/>
  <circle cx="364" cy="196" r="1.5" fill="white"/>
  <!-- snout open mouth -->
  <path d="M374 204 Q385 202 386 210 Q385 218 376 220 Q368 220 364 214 Q362 208 366 204Z" stroke="#1a2e2a" stroke-width="1.5" fill="#f8f5f0"/>
  <path d="M366 214 Q374 220 382 216" stroke="#1a2e2a" stroke-width="1.2" fill="none" opacity="0.5"/>
  <!-- nose -->
  <ellipse cx="380" cy="206" rx="5" ry="3.5" fill="#1a2e2a"/>
  <!-- stiff tail up -->
  <path d="M302 222 Q282 208 280 188 Q280 175 290 175" stroke="#1a2e2a" stroke-width="2.5" fill="none"/>
  <!-- legs straining forward -->
  <line x1="330" y1="242" x2="322" y2="280" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="348" y1="245" x2="345" y2="282" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="362" y1="244" x2="364" y2="280" stroke="#1a2e2a" stroke-width="2.5"/>

  <!-- Alert lines / energy -->
  <line x1="400" y1="165" x2="415" y2="155" stroke="#b07b3f" stroke-width="2" opacity="0.6"/>
  <line x1="408" y1="175" x2="425" y2="170" stroke="#b07b3f" stroke-width="2" opacity="0.5"/>
  <line x1="405" y1="185" x2="422" y2="184" stroke="#b07b3f" stroke-width="2" opacity="0.4"/>

  <!-- Trigger dog silhouette tiny in distance -->
  <ellipse cx="68" cy="238" rx="20" ry="12" stroke="#1a2e2a" stroke-width="1.5" fill="white" opacity="0.6"/>
  <circle cx="83" cy="226" r="12" stroke="#1a2e2a" stroke-width="1.5" fill="white" opacity="0.6"/>
  <path d="M75 218 Q73 210 77 206 Q80 211 80 218" stroke="#1a2e2a" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M84 217 Q87 209 84 205 Q81 210 80 217" stroke="#1a2e2a" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Ground -->
  <line x1="40" y1="282" x2="440" y2="282" stroke="#d4ede6" stroke-width="2"/>
</svg>
