<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Calendar grid -->
  <rect x="100" y="80" width="280" height="230" rx="8" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- header bar -->
  <rect x="100" y="80" width="280" height="52" rx="8" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <rect x="100" y="115" width="280" height="17" fill="#f8f5f0"/>
  <!-- calendar rings -->
  <line x1="162" y1="72" x2="162" y2="92" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="318" y1="72" x2="318" y2="92" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- month label area -->
  <line x1="140" y1="100" x2="340" y2="100" stroke="#1a2e2a" stroke-width="1" opacity="0.2"/>

  <!-- Day headers -->
  <line x1="100" y1="148" x2="380" y2="148" stroke="#1a2e2a" stroke-width="1" opacity="0.15"/>

  <!-- Grid lines vertical -->
  <line x1="140" y1="148" x2="140" y2="310" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="180" y1="148" x2="180" y2="310" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="220" y1="148" x2="220" y2="310" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="260" y1="148" x2="260" y2="310" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="300" y1="148" x2="300" y2="310" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="340" y1="148" x2="340" y2="310" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <!-- Grid lines horizontal -->
  <line x1="100" y1="188" x2="380" y2="188" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="100" y1="228" x2="380" y2="228" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>
  <line x1="100" y1="268" x2="380" y2="268" stroke="#1a2e2a" stroke-width="1" opacity="0.1"/>

  <!-- Day dots — normal -->
  <circle cx="120" cy="168" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="160" cy="168" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <!-- SELECTED day — highlighted with accent -->
  <circle cx="200" cy="168" r="14" stroke="#2f7667" stroke-width="2.5" fill="#2f7667"/>
  <path d="M193 168 L198 173 L208 163" stroke="white" stroke-width="2.5" fill="none"/>
  <!-- more days -->
  <circle cx="240" cy="168" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="280" cy="168" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="320" cy="168" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.3"/>
  <circle cx="360" cy="168" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.3"/>

  <!-- Row 2 -->
  <circle cx="120" cy="208" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="160" cy="208" r="12" stroke="#b07b3f" stroke-width="1.5" fill="#fdf3e3"/>
  <circle cx="200" cy="208" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="240" cy="208" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="280" cy="208" r="12" stroke="#2f7667" stroke-width="1.5" fill="#e8f4f1"/>
  <circle cx="320" cy="208" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.3"/>

  <!-- Row 3 -->
  <circle cx="120" cy="248" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="160" cy="248" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="200" cy="248" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="240" cy="248" r="14" stroke="#b07b3f" stroke-width="2" fill="#fdf3e3"/>
  <circle cx="280" cy="248" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>

  <!-- Row 4 partial -->
  <circle cx="120" cy="288" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>
  <circle cx="160" cy="288" r="12" stroke="#1a2e2a" stroke-width="1.2" fill="white" opacity="0.7"/>

  <!-- Clock in corner -->
  <circle cx="390" cy="100" r="32" stroke="#b07b3f" stroke-width="2" fill="white"/>
  <line x1="390" y1="100" x2="390" y2="78" stroke="#1a2e2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="390" y1="100" x2="404" y2="110" stroke="#b07b3f" stroke-width="2" stroke-linecap="round"/>
  <circle cx="390" cy="100" r="3" fill="#1a2e2a"/>
</svg>
