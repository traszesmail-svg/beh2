<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 50 350 260" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Person walking - simple line figure -->
  <circle cx="240" cy="90" r="22" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- body -->
  <line x1="240" y1="112" x2="240" y2="185" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- arm forward holding leash -->
  <line x1="240" y1="130" x2="278" y2="155" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- arm back -->
  <line x1="240" y1="130" x2="210" y2="155" stroke="#1a2e2a" stroke-width="2.5"/>
  <!-- legs walking -->
  <line x1="240" y1="185" x2="220" y2="235" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="240" y1="185" x2="260" y2="235" stroke="#1a2e2a" stroke-width="2.5"/>

  <!-- Leash - curved -->
  <path d="M278 155 Q310 170 330 195 Q345 215 340 240" stroke="#2f7667" stroke-width="2" fill="none"/>

  <!-- Dog outline - simple profile -->
  <!-- body -->
  <ellipse cx="355" cy="258" rx="38" ry="22" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- head -->
  <circle cx="386" cy="238" r="18" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- ear floppy -->
  <path d="M375 224 Q368 210 374 200 Q380 208 382 220" stroke="#1a2e2a" stroke-width="2" fill="#f8f5f0"/>
  <!-- snout bump -->
  <path d="M398 240 Q406 238 404 244 Q400 248 394 246" stroke="#1a2e2a" stroke-width="2" fill="#f8f5f0"/>
  <!-- eye dot -->
  <circle cx="392" cy="234" r="2.5" fill="#1a2e2a"/>
  <!-- tail up -->
  <path d="M318 248 Q298 235 296 218 Q296 205 306 206" stroke="#1a2e2a" stroke-width="2.5" fill="none"/>
  <!-- legs -->
  <line x1="340" y1="278" x2="335" y2="305" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="355" y1="279" x2="353" y2="306" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="368" y1="279" x2="370" y2="306" stroke="#1a2e2a" stroke-width="2.5"/>
  <line x1="380" y1="276" x2="385" y2="303" stroke="#1a2e2a" stroke-width="2.5"/>

  <!-- Ground line -->
  <line x1="80" y1="308" x2="420" y2="308" stroke="#d4ede6" stroke-width="2"/>

  <!-- Sun / circle accent -->
  <circle cx="120" cy="100" r="30" stroke="#b07b3f" stroke-width="2" fill="none"/>
  <line x1="120" y1="62" x2="120" y2="55" stroke="#b07b3f" stroke-width="2"/>
  <line x1="120" y1="138" x2="120" y2="145" stroke="#b07b3f" stroke-width="2"/>
  <line x1="82" y1="100" x2="75" y2="100" stroke="#b07b3f" stroke-width="2"/>
  <line x1="158" y1="100" x2="165" y2="100" stroke="#b07b3f" stroke-width="2"/>

  <!-- Small heart -->
  <path d="M310 130 Q312 126 316 128 Q320 126 322 130 Q322 134 316 138 Q310 134 310 130Z" fill="#2f7667" opacity="0.6"/>
</svg>
