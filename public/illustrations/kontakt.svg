<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Envelope, large centered -->
  <rect x="80" y="110" width="320" height="200" rx="8" stroke="#1a2e2a" stroke-width="2.5" fill="#f8f5f0"/>
  <!-- envelope V fold -->
  <path d="M80 125 L240 215 L400 125" stroke="#1a2e2a" stroke-width="2" fill="none"/>
  <!-- bottom fold lines -->
  <path d="M80 310 L178 230" stroke="#1a2e2a" stroke-width="1.5" opacity="0.3"/>
  <path d="M400 310 L302 230" stroke="#1a2e2a" stroke-width="1.5" opacity="0.3"/>

  <!-- @ symbol, accent color -->
  <circle cx="240" cy="215" r="36" stroke="#2f7667" stroke-width="2.5" fill="white"/>
  <circle cx="240" cy="215" r="16" stroke="#2f7667" stroke-width="2" fill="none"/>
  <circle cx="240" cy="215" r="6" fill="#2f7667"/>
  <!-- @ tail -->
  <path d="M256 205 Q262 212 261 222 Q260 230 252 232 Q245 233 240 228" stroke="#2f7667" stroke-width="2" fill="none"/>

  <!-- Paper airplane / send icon flying out -->
  <path d="M360 72 L320 100 L340 108 L360 72Z" stroke="#b07b3f" stroke-width="2" fill="#fdf3e3"/>
  <path d="M320 100 L325 118 L340 108" stroke="#b07b3f" stroke-width="2" fill="none"/>
  <!-- motion trail -->
  <line x1="290" y1="92" x2="315" y2="98" stroke="#b07b3f" stroke-width="1.5" opacity="0.4"/>
  <line x1="278" y1="102" x2="312" y2="104" stroke="#b07b3f" stroke-width="1.5" opacity="0.3"/>

  <!-- Small phone icon top left -->
  <rect x="88" y="72" width="36" height="58" rx="6" stroke="#1a2e2a" stroke-width="2" fill="white"/>
  <line x1="98" y1="118" x2="114" y2="118" stroke="#1a2e2a" stroke-width="1.5"/>
  <rect x="100" y="82" width="12" height="26" rx="2" stroke="#1a2e2a" stroke-width="1" fill="#e8f4f1" opacity="0.7"/>

  <!-- Reply arrow -->
  <path d="M182 62 Q200 50 218 62" stroke="#1a2e2a" stroke-width="2" fill="none"/>
  <path d="M182 62 L182 75 L195 62" stroke="#1a2e2a" stroke-width="2" fill="none"/>

  <!-- 24h badge -->
  <circle cx="380" cy="280" r="30" stroke="#2f7667" stroke-width="2" fill="white"/>
  <text x="380" y="277" font-size="10" text-anchor="middle" fill="#2f7667" font-family="sans-serif" font-weight="bold">1–2</text>
  <text x="380" y="290" font-size="8" text-anchor="middle" fill="#2f7667" font-family="sans-serif">dni rob.</text>
</svg>
