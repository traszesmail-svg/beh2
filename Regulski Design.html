<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regulski — Propozycje Redesignu</title>

<body>
<div id="root"></div>
<script type="text/babel">

/* ═══════════════════════════════════════════════
   SHARED PLACEHOLDER
═══════════════════════════════════════════════ */
const ImgPlaceholder = ({ label, w = '100%', h = 320, bg = '#e8e2d9', stripe = '#ddd6cc' }) => (
  <div style={{
    width: w, height: h, background: `repeating-linear-gradient(135deg, ${bg} 0px, ${bg} 10px, ${stripe} 10px, ${stripe} 20px)`,
    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
  }}>
    <span style={{ fontFamily: 'monospace', fontSize: 11, color: '#9a8f84', background: bg, padding: '4px 8px' }}>{label}</span>
  </div>
);

const ImgPlaceholderDark = ({ label, w = '100%', h = 320 }) => (
  <div style={{
    width: w, height: h,
    background: 'repeating-linear-gradient(135deg, #1e2021 0px, #1e2021 10px, #252829 10px, #252829 20px)',
    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
  }}>
    <span style={{ fontFamily: 'monospace', fontSize: 11, color: '#4a4a4a', background: '#1e2021', padding: '4px 8px' }}>{label}</span>
  </div>
);


/* ═══════════════════════════════════════════════
   VERSION A — WZBOGACONA

═══════════════════════════════════════════════ */
const VersionA = () => {
  const c = {
    bg: '#faf8f4',
    bgAlt: '#f3ede3',
    ink: '#1e1a14',
    inkMid: '#5a5046',
    inkLight: '#9a8f80',
    amber: '#c07d3a',
    amberLight: '#f0e6d5',
    line: '#e0d8cc',
  };
  const serif = '"Cormorant Garamond", Georgia, serif';
  const sans = '"DM Sans", system-ui, sans-serif';

  return (
    <div style={{ fontFamily: sans, background: c.bg, color: c.ink, width: 1440 }}>

      {/* HERO */}
      <section style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', minHeight: 700 }}>

            <p style={{ fontSize: 16, lineHeight: 1.75, color: c.inkMid, maxWidth: 440, fontWeight: 300 }}>

      {/* SECTION II — Jak to działa */}

            <div key={s.n} style={{ borderTop: `1px solid ${c.amber}`, paddingTop: 24 }}>
              <div style={{ fontFamily: serif, fontSize: 48, fontWeight: 300, color: c.amberLight, marginBottom: 16, lineHeight: 1 }}>{s.n}</div>
              <div style={{ fontSize: 16, fontWeight: 500, marginBottom: 12, lineHeight: 1.3 }}>{s.t}</div>
              <div style={{ fontSize: 14, color: c.inkMid, lineHeight: 1.75, fontWeight: 300 }}>{s.d}</div>
            </div>
          ))}
        </div>
      </section>

      {/* SECTION III — Usługi */}
      <section style={{ borderTop: `1px solid ${c.line}`, padding: '80px 72px', background: c.ink }}>
        <div style={{ fontSize: 10, letterSpacing: '0.14em', color: c.inkLight, textTransform: 'uppercase', marginBottom: 20 }}>III. / Usługi</div>

          Behawiorysta psów i kotów online.
        </h2>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 2 }}>
          {[
            { tag: 'Kwadrans', price: '69 zł', time: '15 min / audio / bez kamery', title: 'Kwadrans z behawiorystą', desc: 'Porządkuje temat na start. Jedno pytanie albo pierwsze kroki bez długiego wejścia.', items: ['Jedno pytanie albo uporządkowanie sytuacji', '15 minut audio bez kamery', 'Najprostszy pierwszy krok'], cta: 'Zarezerwuj' },
            { tag: 'Pełna konsultacja', price: '350 zł', time: 'ok. 2 h / online', title: 'Kiedy od razu wejść szerzej', desc: 'Daje więcej czasu na kontekst, kilka wątków naraz i jasny plan dalszej pracy.', items: ['Szerszy temat z większą liczbą wątków', 'Więcej czasu na kontekst i plan', 'Opcja dla trudniejszych spraw'], cta: 'Umów konsultację' },
          ].map((s, i) => (
            <div key={s.tag} style={{ background: i === 0 ? c.amber : '#2c2820', padding: '52px 48px' }}>
              <div style={{ fontSize: 11, letterSpacing: '0.12em', color: i === 0 ? 'rgba(255,255,255,0.7)' : c.inkLight, textTransform: 'uppercase', marginBottom: 24 }}>{s.tag}</div>
              <div style={{ fontFamily: serif, fontSize: 56, fontWeight: 300, color: '#faf8f4', marginBottom: 6, lineHeight: 1 }}>{s.price}</div>
              <div style={{ fontSize: 12, color: i === 0 ? 'rgba(255,255,255,0.6)' : c.inkLight, marginBottom: 32 }}>{s.time}</div>
              <h3 style={{ fontFamily: serif, fontSize: 28, fontWeight: 300, color: '#faf8f4', marginBottom: 16, lineHeight: 1.3 }}>{s.title}</h3>
              <p style={{ fontSize: 14, color: i === 0 ? 'rgba(255,255,255,0.8)' : c.inkMid, lineHeight: 1.75, marginBottom: 32 }}>{s.desc}</p>
              <ul style={{ listStyle: 'none', marginBottom: 40 }}>
                {s.items.map(it => (
                  <li key={it} style={{ fontSize: 13, color: i === 0 ? 'rgba(255,255,255,0.85)' : c.inkMid, padding: '8px 0', borderBottom: `1px solid ${i === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)'}`, display: 'flex', gap: 10, alignItems: 'center' }}>
                    <span style={{ color: i === 0 ? 'rgba(255,255,255,0.4)' : c.amber }}>—</span> {it}
                  </li>
                ))}
              </ul>
              <div style={{ border: `1px solid ${i === 0 ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)'}`, color: '#faf8f4', fontSize: 14, padding: '13px 28px', display: 'inline-flex', cursor: 'pointer', borderRadius: 2 }}>{s.cta} →</div>
            </div>
          ))}
        </div>
      </section>

      {/* OPINIE */}
      <section style={{ padding: '80px 72px', borderTop: `1px solid ${c.line}` }}>
        <div style={{ fontSize: 10, letterSpacing: '0.14em', color: c.inkLight, textTransform: 'uppercase', marginBottom: 64 }}>V. / Opinie</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 2 }}>

                &ldquo;{o.q}&rdquo;
              </div>
              <div style={{ fontSize: 12, color: c.inkLight, letterSpacing: '0.05em' }}>— {o.who}</div>
            </div>
          ))}
        </div>
      </section>

      {/* CTA FINAL */}
      <section style={{ padding: '80px 72px', borderTop: `1px solid ${c.line}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <h2 style={{ fontFamily: serif, fontSize: 52, fontWeight: 300, lineHeight: 1.2, maxWidth: 560 }}>
          Jeśli coś Cię niepokoi,{' '}
          <em style={{ fontStyle: 'italic', color: c.amber }}>zacznij spokojnie.</em>
        </h2>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, alignItems: 'flex-end' }}>
          <div style={{ background: c.amber, color: '#fff', fontSize: 14, fontWeight: 500, padding: '16px 36px', borderRadius: 2, cursor: 'pointer', whiteSpace: 'nowrap' }}>
            Zarezerwuj Kwadrans z behawiorystą →
          </div>
          <div style={{ border: `1px solid ${c.line}`, color: c.inkMid, fontSize: 14, padding: '16px 36px', borderRadius: 2, cursor: 'pointer', whiteSpace: 'nowrap' }}>

        <div>
          <div style={{ fontFamily: serif, fontSize: 28, fontWeight: 300, color: '#faf8f4', marginBottom: 16 }}>Regulski.</div>
          <div style={{ fontSize: 13, lineHeight: 1.8, maxWidth: 280, fontWeight: 300 }}>Spokojna pomoc w zrozumieniu problemów zachowania psów i kotów. Terapia behawioralna online dla opiekunów z całej Polski.</div>

          <div key={col.h}>
