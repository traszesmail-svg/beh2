  <rect x="72" y="1220" width="1096" height="366" rx="36" fill="white"/>
  <text x="72" y="182" fill="#F2F0F7" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#F2F0F7" font-family="Arial" font-size="86" font-weight="700">Pierwsze dni po adopcji</text>
  <text x="72" y="425" fill="#F2F0F7" font-family="Georgia" font-size="34">Bezpieczne wdrożenie psa lub kota do domu bez przeciążania, pośpiechu i złych interpretacji</text>
  <text x="72" y="1298" fill="#1F1D2A" font-family="Arial" font-size="26" letter-spacing="2">DLA KOGO</text>
  <text x="72" y="1360" fill="#1F1D2A" font-family="Georgia" font-size="34">Opiekunowie świeżo adoptowanych psów lub kotów, którzy chcą przejść pierwszy tydzień spokojnie i bez zbędnych błędów.</text>
  <text x="72" y="1480" fill="#1F1D2A" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#1F1D2A" font-family="Georgia" font-size="34">Porządkuje pierwszy tydzień po adopcji: środowisko, oczekiwania, obserwację i decyzję, kiedy potrzebne jest dalsze wsparcie.</text>
  <rect x="72" y="1650" width="220" height="40" rx="20" fill="#AAA5C8"/>
  <text x="104" y="1677" fill="#F2F0F7" font-family="Arial" font-size="24" font-weight="700">SZYBKI PORADNIK</text>
</svg>
