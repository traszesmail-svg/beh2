  <circle cx="1020" cy="210" r="260" fill="#747A99" fill-opacity="0.18"/>
  <circle cx="230" cy="1540" r="310" fill="#A5ACCB" fill-opacity="0.11"/>
  <rect x="72" y="1220" width="1096" height="366" rx="36" fill="white"/>
  <text x="72" y="182" fill="#F1F2F7" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#F1F2F7" font-family="Arial" font-size="86" font-weight="700">Pies boi się gości i dźwięków</text>
  <text x="72" y="425" fill="#F1F2F7" font-family="Georgia" font-size="34">Jak ustawić bezpieczny plan przy lęku domowym, dzwonku i trudnych wizytach</text>
  <text x="72" y="1298" fill="#1D1F2A" font-family="Arial" font-size="26" letter-spacing="2">DLA KOGO</text>
  <text x="72" y="1360" fill="#1D1F2A" font-family="Georgia" font-size="34">Opiekunowie psów, które źle znoszą gości, dźwięki, ruch na klatce albo nagłe bodźce.</text>
  <text x="72" y="1480" fill="#1D1F2A" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#1D1F2A" font-family="Georgia" font-size="34">Pomaga odróżnić zwykłą czujność od przeciążenia lękowego i ustawić prosty plan awaryjny.</text>
  <rect x="72" y="1650" width="220" height="40" rx="20" fill="#A5ACCB"/>
  <text x="104" y="1677" fill="#F1F2F7" font-family="Arial" font-size="24" font-weight="700">SZYBKI PORADNIK</text>
</svg>
