<?xml version="1.0" encoding="UTF-8"?>
<svg width="1240" height="1754" viewBox="0 0 1240 1754" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1240" height="1754" fill="#F0F5F6"/>
  <rect x="0" y="0" width="1240" height="560" fill="#2F5665"/>
  <rect x="72" y="108" width="1096" height="1.5" fill="#F0F5F6" fill-opacity="0.4"/>
  <circle cx="1020" cy="210" r="260" fill="#5B8390" fill-opacity="0.18"/>
  <circle cx="230" cy="1540" r="310" fill="#80B5BF" fill-opacity="0.12"/>
  <rect x="72" y="1204" width="1096" height="420" rx="36" fill="white"/>
  <text x="72" y="182" fill="#F0F5F6" font-family="Arial" font-size="34" letter-spacing="3"><tspan x="72" dy="0">REGULSKI | TERAPIA BEHAWIORALNA</tspan></text>
  <text x="72" y="318" fill="#F0F5F6" font-family="Arial" font-size="74" font-weight="700"><tspan x="72" dy="0">Pogoń, demolka i brak</tspan><tspan x="72" dy="92">hamulców?</tspan></text>
  <text x="72" y="438" fill="#F0F5F6" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Jak rozpoznać przewlekłe pobudzenie, frustrację i brak</tspan><tspan x="72" dy="44">wyhamowania — i od czego zacząć</tspan></text>
  <text x="72" y="1298" fill="#1A262C" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">DLA KOGO</tspan></text>
  <text x="72" y="1360" fill="#1A262C" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Opiekun psa, który widzi pogoń, demolkę i brak wyhamowania w</tspan><tspan x="72" dy="42">codzienności.</tspan></text>
  <text x="72" y="1530" fill="#1A262C" font-family="Arial" font-size="26" letter-spacing="2"><tspan x="72" dy="0">OBIETNICA</tspan></text>
  <text x="72" y="1592" fill="#1A262C" font-family="Georgia" font-size="34"><tspan x="72" dy="0">Core ścieżki pobudzenia, które nie kończy się na samym „ma dużo</tspan><tspan x="72" dy="42">energii”.</tspan></text>
  <rect x="72" y="1678" width="220" height="40" rx="20" fill="#80B5BF"/>
  <text x="104" y="1705" fill="#F0F5F6" font-family="Arial" font-size="24" font-weight="700"><tspan x="104" dy="0">PORADNIK GLOWNY</tspan></text>
</svg>
