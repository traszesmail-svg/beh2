  <text x="72" y="182" fill="#F8F0E8" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#F8F0E8" font-family="Arial" font-size="86" font-weight="700">Pies reaktywny na spacerze</text>
  <text x="72" y="425" fill="#F8F0E8" font-family="Georgia" font-size="34">Pierwszy plan pracy przy szczekaniu, spinaniu się i trudnych mijankach</text>
  <text x="72" y="1298" fill="#261A13" font-family="Arial" font-size="26" letter-spacing="2">DLA KOGO</text>
  <text x="72" y="1360" fill="#261A13" font-family="Georgia" font-size="34">Opiekunowie psów, które źle znoszą mijanie psów, ludzi albo innych bodźców na spacerze.</text>
  <text x="72" y="1480" fill="#261A13" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#261A13" font-family="Georgia" font-size="34">Pomaga uporządkować dystans, trasy spacerowe i pierwszą procedurę pracy bez dokładania chaosu.</text>
  <rect x="72" y="1650" width="220" height="40" rx="20" fill="#D89A63"/>
  <text x="104" y="1677" fill="#F8F0E8" font-family="Arial" font-size="24" font-weight="700">SZYBKI PORADNIK</text>
