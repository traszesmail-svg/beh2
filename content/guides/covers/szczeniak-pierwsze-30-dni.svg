  <text x="72" y="182" fill="#F4F4EE" font-family="Arial" font-size="34" letter-spacing="3">REGULSKI | TERAPIA BEHAWIORALNA</text>
  <text x="72" y="320" fill="#F4F4EE" font-family="Arial" font-size="86" font-weight="700">Szczeniak: pierwsze 30 dni</text>
