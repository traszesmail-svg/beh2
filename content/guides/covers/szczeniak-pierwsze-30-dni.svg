  <text x="72" y="1360" fill="#1D2418" font-family="Georgia" font-size="34">Nowi opiekunowie młodego psa, którzy chcą ułożyć pierwszy miesiąc mądrze i bez przeciążenia siebie ani szczeniaka.</text>
  <text x="72" y="1480" fill="#1D2418" font-family="Arial" font-size="26" letter-spacing="2">OBIETNICA</text>
  <text x="72" y="1542" fill="#1D2418" font-family="Georgia" font-size="34">Daje plan dnia, priorytety i granice na pierwszy miesiąc, zanim drobne trudności staną się stałym problemem.</text>
