<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @page {
    size: A3 landscape;
    margin: 0;
  }

  html, body {
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Each "page" is exactly A3 landscape: 420mm × 297mm */
  .print-page {
    width: 420mm;
    height: 297mm;
    overflow: hidden;
    break-after: page;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Design content is rendered at 1440px wide, scaled to fit 420mm */
  /* 420mm at 96dpi = 1587px; scale = 1587/1440 = 1.102 — fits! */
  /* We'll use scale so the 1440-wide layout fills the 420mm page width */
  .design-scale {
    width: 1440px;
    transform: scale(1.1);
    transform-origin: top left;
    flex-shrink: 0;
  }

  /* Clip window: how many px of design to show per page */
  /* Visible height at scale 1.1: 297mm at 96dpi ≈ 1122px / 1.1 = 1020px of content */
  .clip-window {
    overflow: hidden;
    flex: 1;
  }

  .clip-window .design-scale {
    margin-top: var(--scroll-y, 0px);
  }

  /* Cover pages */
  .cover-a {
    background: #faf8f4;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
  }
  .cover-b {
    background: #0e0f0d;
    align-items: center;
    justify-content: center;
  }

  /* Label strip at top of design pages */
  .page-label {
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 32px;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    border-bottom: 1px solid;
  }
  .page-label-a { background: #faf8f4; color: #9a8f80; border-color: #e0d8cc; }
  .page-label-b { background: #0e0f0d; color: #5a5a56; border-color: #2a2b27; }
  .page-label .pg { margin-left: auto; }

  @media screen {
    body { background: #888; }
    .print-page {
      margin: 20px auto;
      box-shadow: 0 4px 32px rgba(0,0,0,0.3);
    }
  }
</style>
</head>

/* Each print-page clips a vertical slice of the full design at a given scroll offset.

const DesignPage = ({ version, label, page, total, scrollY, clipH = 1020, scaleRef }) => (
  <div className="print-page" style={{ background: version === 'a' ? '#faf8f4' : '#0e0f0d' }}>
    <div className={`page-label page-label-${version}`}>
      <span style={{ color: version === 'a' ? '#c07d3a' : '#7aad82', marginRight: 12 }}>
        {version === 'a' ? 'Wersja A — Wzbogacona · Warmth & Editorial' : 'Wersja B — Skrajnie alternatywna · Dark & Structural'}
      </span>
      <span>regulski.pl</span>
      <span className="pg">{page} / {total}</span>
    </div>
    <div className="clip-window" style={{ height: clipH * 1.1 }}>
      <div className="design-scale" style={{ '--scroll-y': `-${scrollY}px` }}>
        {version === 'a' ? <VersionAFull /> : <VersionBFull />}
      </div>
    </div>
  </div>
);

          <div style={{ width:80, height:1, background:'#c07d3a', margin:'0 auto 48px' }}/>
          <div style={{ fontFamily:'"DM Sans",sans-serif', fontSize:13, color:'#9a8f80', lineHeight:2 }}>
